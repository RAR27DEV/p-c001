<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BurnoutSense - Buat Akun</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-fonts-and-colors">
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap');

    :root {
      --color-brand-primary: #4A6753;
      --color-brand-secondary: #EAF2EE;
      --color-bg-gradient-start: #EAEFEC;
      --color-bg-gradient-end: #F6F9F8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--color-bg-gradient-start) 0%, var(--color-bg-gradient-end) 100%);
      min-height: 100vh;
      color: #333;
    }

    .font-serif {
      font-family: 'Playfair Display', serif;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05);
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body class="flex items-center justify-center p-4 lg:p-0">
<!-- BEGIN: MainContainer -->
<main class="w-full max-w-7xl h-[90vh] min-h-[700px] flex flex-col lg:flex-row overflow-hidden relative">
<!-- Background subtle gradient effect -->
<div class="absolute inset-0 bg-gradient-to-br from-[#E2ECE7] via-white to-[#F2F8F5] -z-10"></div>
<!-- BEGIN: LeftSection (Hero/Illustration) -->
<section class="w-full lg:w-1/2 p-8 lg:p-16 flex flex-col justify-between relative z-10">
<!-- Brand Header -->
<header class="flex items-center gap-2">
<svg class="w-6 h-6 text-[#4A6753]" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"></path>
</svg>
<span class="font-serif text-xl font-medium tracking-wide text-gray-800">BurnoutSense</span>
</header>
<!-- Illustration -->
<div class="flex-1 flex items-center justify-center py-12">
<img alt="Organic character holding a sprout" class="max-w-[80%] h-auto drop-shadow-xl mix-blend-multiply opacity-90" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCADImq3yK1jN4Sx_HDRZ9fCasXlXWmGdmP6kU_5f3yPql-6S8rXIKcjyhCp92ULjtumhQ7kuOuyYiL1Vnyjc1gOT8TpmlNQLrW_MMlwoyXd2s49Gj5o9TRXwNqF_aSZPCdZo4YBToNZbY0bOdHT2VthKSLGKmd7cO3g8Tn_Jtw4pFBrZDArB4EKYDGs5k1svUiNpGbar70vDuZ-y7JLQCoFYOc36qpxve8MvNaT392RgOKocq9RH5C9jolQvVN_09YgjJcrEgl7Jw"/>
</div>
<!-- Quote/Testimonial Area -->
<div class="mt-auto">
<div class="w-8 h-1 bg-[#4A6753] mb-6 opacity-60"></div>
<blockquote class="font-serif text-2xl lg:text-3xl leading-relaxed text-gray-800 mb-4">
          "Produktivitas tanpa jeda adalah jalan menuju kehancuran."
        </blockquote>
<p class="text-gray-500 text-sm mb-6">Jeda adalah investasi.</p>
<!-- Carousel Indicators Placeholder -->
<div class="flex gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-gray-300"></div>
<div class="w-1.5 h-1.5 rounded-full bg-gray-300"></div>
<div class="w-4 h-1.5 rounded-full bg-[#4A6753]"></div>
<div class="w-1.5 h-1.5 rounded-full bg-gray-300"></div>
<div class="w-1.5 h-1.5 rounded-full bg-gray-300"></div>
</div>
</div>
</section>
<!-- END: LeftSection -->
<!-- BEGIN: RightSection (Form) -->
<section class="w-full lg:w-1/2 flex items-center justify-center p-4 sm:p-8 lg:p-16 relative z-10">
<!-- Form Card -->
<div class="glass-panel w-full max-w-md rounded-3xl p-8 sm:p-10 relative">
<!-- Form Header -->
<div class="text-center mb-8">
<h1 class="font-serif text-3xl font-medium text-gray-900 mb-2">Buat Akun</h1>
<p class="text-sm text-gray-500">Siapkan kredensial login kamu.</p>
</div>
<!-- Progress Steps -->
<div class="flex items-center justify-center gap-4 mb-8">
<div class="flex items-center gap-2">
<div class="w-6 h-6 rounded-full bg-[#4A6753] text-white flex items-center justify-center text-xs font-semibold">1</div>
<span class="text-xs font-medium text-[#4A6753]">Akun</span>
</div>
<div class="w-16 h-px bg-gray-200"></div>
<div class="flex items-center gap-2 opacity-50">
<div class="w-6 h-6 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center text-xs font-semibold">2</div>
<span class="text-xs font-medium text-gray-500">Profil</span>
</div>
</div>
<!-- Toggle Login/Signup -->
<div class="flex bg-[#F5F8F6] rounded-xl p-1 mb-8">
<a class="flex-1 py-2 text-center text-sm font-medium text-gray-600 hover:text-gray-900 rounded-lg flex items-center justify-center gap-2 transition-colors" href="#">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
            Masuk
          </a>
<a class="flex-1 py-2 text-center text-sm font-medium bg-white text-gray-900 shadow-sm rounded-lg flex items-center justify-center gap-2" href="#">
<svg class="w-4 h-4 text-[#4A6753]" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
            Daftar
          </a>
</div>
<!-- Signup Form -->
<form action="#" class="space-y-5" method="POST">
<!-- Username Field -->
<div>
<label class="block text-xs font-medium text-gray-700 mb-1.5" for="username">Nama Pengguna</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-transparent bg-[#EDF2FE] rounded-xl text-sm focus:ring-[#4A6753] focus:border-[#4A6753] transition-colors text-gray-900 placeholder-gray-400" id="username" name="username" placeholder="gojo" type="text"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block text-xs font-medium text-gray-700 mb-1.5" for="password">Kata Sandi (Min 6)</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<input class="block w-full pl-10 pr-10 py-2.5 border border-gray-200 bg-[#EDF2FE] rounded-xl text-sm focus:ring-[#4A6753] focus:border-[#4A6753] transition-colors text-gray-900" id="password" name="password" type="password" value="••••••"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600" type="button">
<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-medium text-white bg-[#4A6753] hover:bg-[#3d5544] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#4A6753] transition-colors" type="submit">
              Lanjut — Profil
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
</form>
</div>
</section>
<!-- END: RightSection -->
</main>
<!-- END: MainContainer -->
</body></html>

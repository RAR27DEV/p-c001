<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BurnoutSense - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="typography">
    @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@400;500;600&display=swap');

    body {
      font-family: 'Inter', sans-serif;
    }
    h1, h2, h3, .serif-text {
      font-family: 'Lora', serif;
    }
  </style>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              green: '#4B6B56',
              lightGreen: '#EBF1ED',
              bgLeft: '#E1EBE2',
              bgRight: '#F4F9F6',
              text: '#1F2937',
              muted: '#6B7280',
              inputBg: '#E8F0FE',
              inputBorder: '#D1D5DB'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen flex bg-brand-bgRight text-brand-text">
<!-- BEGIN: Left Split Area (Illustration & Quote) -->
<div class="hidden lg:flex w-1/2 bg-brand-bgLeft flex-col justify-between p-12 relative overflow-hidden">
<!-- Header/Logo -->
<header class="flex items-center gap-2">
<svg class="w-6 h-6 text-brand-green" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z" opacity="0.3"></path>
<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 7h2v6h-2zm0 8h2v2h-2z"></path>
</svg>
<span class="serif-text text-2xl font-medium tracking-wide">BurnoutSense</span>
</header>
<!-- Main Illustration -->
<div class="flex-1 flex items-center justify-center -mt-12 relative z-10">
<img alt="A simple, minimalist organic character illustration for a login screen. The style should match https://lh3.googleusercontent.com/aida-public/AB6AXuCbeMbNtJL-PScKp2o_BGdO5BkTpHKfESTvCkp-8JNOc-auIT4ylLAfRKZZtiHpGqlZET9V-Ipz-Cmn4agjQcw2PHEAQjb8EEgeG9UExCxWeBuVCFLGuoZe2sbsFq6Kwm8lfjTXX8rrFcDlCkoh0o_sQUGaRcoemtARQE6Em2o-tpbfCamKRJkmX6dgfPEvuD4iaEZ0yoZW-z8WCFPfvM_wdtXjOnPulJfw9BQpebJ8YR6r9MELm4J9GJ6I6MexMRG6IbvEkzC20p0: rounded, soft shapes, pastel colors (soft greens and blues), and a very simple facial expression (gentle smile, closed eyes). The character should be in a welcoming pose, perhaps waving or sitting calmly next to a portal/door. Professional, clean, flat design. White background." class="max-w-md w-full h-auto object-contain drop-shadow-2xl mix-blend-multiply" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQxOPuy_FUfERHF80uq9zdWGZW6dizAF9OF8ODRE8dTFVwiwDI58awAYFocjnjI-dWfDgpzEl7w-m4dtFn82kIHj9Rxq-rSdMLOrBtZHqh8g3C80D6D0qvhkuFs459N0T5bsW1KZ-twTDCjBLpXxHa0WraG21rdjOKFKbyIqLMaWDsDsXqeIjglCDGF5P9KyVRcM387qIOhmOfbeQ5kLTQqlcbRxar_L9ZCpkRnmvOvNIUNKW77hFiP3l-oAhG8I9t2LY0C8RjOwo"/>
</div>
<!-- Quote Section -->
<div class="relative z-10">
<div class="w-12 h-0.5 bg-brand-green/30 mb-6"></div>
<blockquote class="serif-text text-3xl leading-snug mb-4 max-w-xl text-brand-text/90">
        "Burnout bukan kegagalan. Itu sinyal bahwa kamu butuh perubahan."
      </blockquote>
<p class="text-brand-muted mb-8">Dengarkan tubuhmu.</p>
<!-- Carousel Indicators -->
<div class="flex gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-brand-green/30"></span>
<span class="w-4 h-1.5 rounded-full bg-brand-green"></span>
<span class="w-1.5 h-1.5 rounded-full bg-brand-green/30"></span>
<span class="w-1.5 h-1.5 rounded-full bg-brand-green/30"></span>
<span class="w-1.5 h-1.5 rounded-full bg-brand-green/30"></span>
</div>
</div>
</div>
<!-- END: Left Split Area -->
<!-- BEGIN: Right Split Area (Login Form) -->
<main class="w-full lg:w-1/2 flex items-center justify-center p-8 relative">
<!-- Decorative background gradient (subtle) -->
<div class="absolute inset-0 bg-gradient-to-br from-white/40 to-transparent pointer-events-none"></div>
<div class="w-full max-w-md bg-white rounded-3xl p-10 shadow-[0_8px_30px_rgb(0,0,0,0.04)] relative z-10">
<!-- Form Header -->
<div class="text-center mb-8">
<h1 class="text-4xl mb-3 text-gray-900">Selamat Datang</h1>
<p class="text-brand-muted text-sm">Lanjutkan perjalanan pemulihan Anda.</p>
</div>
<!-- Tab Switcher -->
<div class="flex p-1 bg-gray-50 rounded-2xl mb-8">
<button class="flex-1 flex items-center justify-center gap-2 py-3 bg-white rounded-xl shadow-sm text-sm font-medium text-gray-800 transition-all">
<svg class="w-4 h-4 text-brand-green" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
          Masuk
        </button>
<button class="flex-1 flex items-center justify-center gap-2 py-3 text-sm font-medium text-gray-500 hover:text-gray-800 transition-all">
<svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
          Daftar
        </button>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Username Input -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2" for="username">Nama Pengguna</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-brand-inputBg border-transparent focus:bg-white focus:border-brand-green focus:ring-2 focus:ring-brand-green/20 rounded-2xl text-sm transition-all shadow-sm" id="username" name="username" placeholder="gojo" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div>
<label class="block text-sm font-medium text-gray-700 mb-2" for="password">Kata Sandi</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full pl-11 pr-12 py-3.5 bg-brand-inputBg border-transparent focus:bg-white focus:border-brand-green focus:ring-2 focus:ring-brand-green/20 rounded-2xl text-sm transition-all shadow-sm tracking-widest" id="password" name="password" placeholder="••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 transition-colors" type="button">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path class="hidden" d="M3 3l18 18" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path> <!-- Crossed out line for hidden state -->
</svg>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex items-center justify-center gap-2 py-4 px-6 border border-transparent rounded-2xl shadow-sm text-sm font-semibold text-white bg-brand-green hover:bg-brand-green/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-green transition-colors mt-8" type="submit">
          Masuk Sekarang
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</form>
</div>
</main>
<!-- END: Right Split Area -->
</body></html>
